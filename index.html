<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Ball 2 - The King</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a2e; display:flex; flex-direction:column; align-items:center; min-height:100vh; font-family:Arial,sans-serif; color:#fff; }
h1 { font-size:1em; color:#ff6b35; padding:6px; }
#wrap { width:100vw; max-width:600px; }
#status { color:#aaa; font-size:0.7em; text-align:center; padding:3px; }
#game-area { width:100%; aspect-ratio:4/3; background:#000; border:2px solid #ff6b35; }
#controls { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:8px; background:#0d0621; width:100%; max-width:600px; }
.btn { background:#2d1b4e; border:2px solid #ff6b35; border-radius:12px; color:#fff; font-size:1.8em; padding:14px 0; cursor:pointer; user-select:none; -webkit-user-select:none; touch-action:none; text-align:center; }
.btn:active,.btn.pressed { background:#ff6b35; }
.e { visibility:hidden; }
#jmp { grid-column:1/4; font-size:1em; padding:12px; }
</style>
</head>
<body>
<h1>Red Ball 2 - The King</h1>
<div id="wrap">
  <div id="game-area"></div>
  <div id="status">Cargando...</div>
</div>
<div id="controls">
  <button class="btn e"></button>
  <button class="btn" id="u">^</button>
  <button class="btn e"></button>
  <button class="btn" id="l">&lt;</button>
  <button class="btn" id="d">v</button>
  <button class="btn" id="r">&gt;</button>
  <button class="btn" id="jmp">SALTAR</button>
</div>
<script>
var ST = document.getElementById('status');
var RP = null;
var CDN = "https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.25/";
window.RufflePlayer = {config:{publicPath:CDN,autoplay:"on"}};
var sc = document.createElement('script');
sc.src = CDN + "ruffle.js";
sc.onload = function() {
  ST.textContent = "Cargando juego...";
  var rf = window.RufflePlayer.newest();
  var pl = rf.createPlayer();
  pl.style.cssText = "width:100%;aspect-ratio:4/3;display:block;background:#000;";
  var ar = document.getElementById('game-area');
  ar.parentNode.replaceChild(pl, ar);
  RP = pl;
  pl.load({url:"redball2_theking.swf",allowScriptAccess:true,scale:"showAll",quality:"high",menu:false,autoplay:"on"})
  .then(function(){ ST.textContent="Listo!"; })
  .catch(function(e){ ST.textContent="Error: "+e; });
};
sc.onerror = function(){ ST.textContent="Error CDN"; };
document.head.appendChild(sc);
var kc = {ArrowUp:38,ArrowDown:40,ArrowLeft:37,ArrowRight:39};
function sk(t,k) {
  if (!RP) return;
  var o={key:k,code:k,which:kc[k]||0,keyCode:kc[k]||0,bubbles:true,cancelable:true,composed:true};
  var targets=[window,document,document.body,RP];
  if (RP.shadowRoot) {
    targets.push(RP.shadowRoot);
    var cv=RP.shadowRoot.querySelector('canvas');
    if (cv) targets.push(cv);
    RP.shadowRoot.querySelectorAll('div').forEach(function(d){targets.push(d);});
  }
  targets.forEach(function(el){try{el.dispatchEvent(new KeyboardEvent(t,o));}catch(e){}});
}
var km={u:'ArrowUp',d:'ArrowDown',l:'ArrowLeft',r:'ArrowRight',jmp:'ArrowUp'};
var held={};
Object.keys(km).forEach(function(id){
  var k=km[id],b=document.getElementById(id);
  function press(e){
    e.preventDefault(); b.classList.add('pressed');
    if (!held[k]){ held[k]=true; sk('keydown',k); held[k+'i']=setInterval(function(){sk('keydown',k);},50); }
  }
  function release(e){
    e.preventDefault(); b.classList.remove('pressed');
    held[k]=false; clearInterval(held[k+'i']); sk('keyup',k);
  }
  b.addEventListener('touchstart',press,{passive:false});
  b.addEventListener('touchend',release,{passive:false});
  b.addEventListener('touchcancel',release,{passive:false});
  b.addEventListener('mousedown',press);
  b.addEventListener('mouseup',release);
  b.addEventListener('mouseleave',release);
});
</script>
</body>
</html>
