<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Ball 2</title>
<style>
  body { margin:0; background:#000; display:flex; flex-direction:column; align-items:center; height:100vh; overflow:hidden; }
  #game-container { width:100vw; height:60vh; background:#000; }
  #controls { display:grid; grid-template-columns:repeat(3,1fr); width:100vw; height:40vh; gap:2px; padding:5px; box-sizing:border-box; }
  .btn { background:#333; color:#fff; border:none; font-size:2em; border-radius:10px; }
  .btn:active { background:#ff6b35; }
</style>
</head>
<body>

<div id="game-container"></div>

<div id="controls">
  <button class="btn" style="visibility:hidden"></button>
  <button class="btn" id="u">▲</button>
  <button class="btn" style="visibility:hidden"></button>
  <button class="btn" id="l">◀</button>
  <button class="btn" id="d">▼</button>
  <button class="btn" id="r">▶</button>
  <button class="btn" id="jmp" style="grid-column: span 3">SALTAR</button>
</div>

<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    const container = document.getElementById("game-container");
    container.appendChild(player);
    
    player.load({url: "redball2_patched.swf", scale: "exactFit"});

    const keys = { 'u': 'ArrowUp', 'd': 'ArrowDown', 'l': 'ArrowLeft', 'r': 'ArrowRight', 'jmp': ' ' };
    
    Object.keys(keys).forEach(id => {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        player.dispatchEvent(new KeyboardEvent('keydown', { key: keys[id] }));
      });
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        player.dispatchEvent(new KeyboardEvent('keyup', { key: keys[id] }));
      });
    });
  });
</script>

</body>
</html>
