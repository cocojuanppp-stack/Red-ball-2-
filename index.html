<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Red Ball 2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a2e; display:flex; flex-direction:column; align-items:center; font-family:Arial,sans-serif; color:#fff; }
h1 { font-size:1em; color:#ff6b35; padding:6px; }
#wrap { width:100vw; max-width:600px; }
#status { color:#aaa; font-size:0.7em; text-align:center; padding:3px; }
#game-area { width:100%; aspect-ratio:4/3; background:#000; border:2px solid #ff6b35; }
#controls { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; padding:8px; background:#0d0621; width:100%; max-width:600px; }
.btn { background:#2d1b4e; border:2px solid #ff6b35; border-radius:12px; color:#fff; font-size:1.8em; padding:14px 0; cursor:pointer; user-select:none; -webkit-user-select:none; touch-action:none; text-align:center; }
.btn:active,.btn.pressed { background:#ff6b35; }
.e { visibility:hidden; }
#jmp { grid-column:1/4; font-size:1em; padding:12px; }
</style>
</head>
<body>
<h1>Red Ball 2 - The King</h1>
<div id="wrap">
  <div id="game-area"></div>
  <div id="status">Cargando...</div>
</div>
<div id="controls">
  <button class="btn e"></button>
  <button class="btn" id="u">^</button>
  <button class="btn e"></button>
  <button class="btn" id="l">&lt;</button>
  <button class="btn" id="d">v</button>
  <button class="btn" id="r">&gt;</button>
  <button class="btn" id="jmp">SALTAR</button>
</div>
<script>
var ST = document.getElementById('status');
var RP = null;
var CDN = "https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.1.25/";
window.RufflePlayer = {config:{publicPath:CDN,autoplay:"on"}};
var sc = document.createElement('script');
sc.src = CDN + "ruffle.js";
sc.onload = function() {
  var rf = window.RufflePlayer.newest();
  var pl = rf.createPlayer();
  pl.style.cssText = "width:100%;aspect-ratio:4/3;display:block;background:#000;";
  document.getElementById('game-area').replaceWith(pl);
  RP = pl;
  pl.load({url:"redball2_theking.swf",allowScriptAccess:true,scale:"showAll",quality:"high",menu:false,autoplay:"on"})
  .then(function(){ ST.textContent="Listo! Toca el juego y luego usa los botones"; })
  .catch(function(e){ ST.textContent="Error: "+e; });
};
sc.onerror = function(){ ST.textContent="Error CDN"; };
document.head.appendChild(sc);

var kc = {u:38,d:40,l:37,r:39,jmp:38};

function fire(t,k) {
  var o = {key:k==37?'ArrowLeft':k==39?'ArrowRight':k==38?'ArrowUp':'ArrowDown',
           code:k==37?'ArrowLeft':k==39?'ArrowRight':k==38?'ArrowUp':'ArrowDown',
           keyCode:k, which:k, charCode:0,
           bubbles:true, cancelable:true, composed:true,
           shiftKey:false, ctrlKey:false, altKey:false, metaKey:false};
  [window, document, document.body].forEach(function(el){
    try{ el.dispatchEvent(new KeyboardEvent(t,o)); }catch(e){}
  });
  if (!RP) return;
  try{ RP.focus(); }catch(e){}
  [RP].forEach(function(el){
    try{ el.dispatchEvent(new KeyboardEvent(t,o)); }catch(e){}
  });
  if (!RP.shadowRoot) return;
  var sr = RP.shadowRoot;
  try{ sr.dispatchEvent(new KeyboardEvent(t,o)); }catch(e){}
  sr.querySelectorAll('*').forEach(function(el){
    try{ el.dispatchEvent(new KeyboardEvent(t,o)); }catch(e){}
  });
}

var held = {};
Object.keys(kc).forEach(function(id) {
  var k = kc[id];
  var b = document.getElementById(id);
  function dn(e) {
    e.preventDefault();
    b.classList.add('pressed');
    if (!held[id]) {
      held[id] = true;
      fire('keydown', k);
      held[id+'_t'] = setInterval(function(){ fire('keydown',k); }, 40);
    }
  }
  function up(e) {
    e.preventDefault();
    b.classList.remove('pressed');
    held[id] = false;
    clearInterval(held[id+'_t']);
    fire('keyup', k);
  }
  b.addEventListener('touchstart', dn, {passive:false});
  b.addEventListener('touchend', up, {passive:false});
  b.addEventListener('touchcancel', up, {passive:false});
  b.addEventListener('mousedown', dn);
  b.addEventListener('mouseup', up);
  b.addEventListener('mouseleave', up);
});
</script>
</body>
</html>
